manager:
  crypto-key: ${MANAGER_CRYPTO_KEY:}
  public-base-url: ${MANAGER_PUBLIC_BASE_URL:http://localhost:8780}
  clickhouse:
    endpoint-url: ${MANAGER_CLICKHOUSE_ENDPOINT_URL:http://clickhouse:8123}
    database: ${MANAGER_CLICKHOUSE_DATABASE:castrelyx}
    username: ${MANAGER_CLICKHOUSE_USER:default}
    password: ${MANAGER_CLICKHOUSE_PASSWORD:}
    raw-table: ${MANAGER_CLICKHOUSE_RAW_TABLE:castrelyx_agent_events}
  vault:
    enabled: ${MANAGER_VAULT_ENABLED:false}
    base-url: ${MANAGER_VAULT_BASE_URL:http://castrelvault:8781}
    admin-session-token: ${MANAGER_VAULT_ADMIN_SESSION_TOKEN:}
    key-store-path: ${MANAGER_VAULT_KEYSTORE_PATH:}
    key-store-password: ${MANAGER_VAULT_KEYSTORE_PASSWORD:}
    trust-store-path: ${MANAGER_VAULT_TRUSTSTORE_PATH:}
    trust-store-password: ${MANAGER_VAULT_TRUSTSTORE_PASSWORD:}
    migration-token: ${MANAGER_VAULT_MIGRATION_TOKEN:}
  remote-access:
    enabled: ${MANAGER_REMOTE_ACCESS_ENABLED:true}
    default-ssh-user: ${MANAGER_REMOTE_ACCESS_DEFAULT_SSH_USER:keinus}
    default-port: ${MANAGER_REMOTE_ACCESS_DEFAULT_PORT:22}
    key-ttl-seconds: ${MANAGER_REMOTE_ACCESS_KEY_TTL_SECONDS:600}
    session-ttl-seconds: ${MANAGER_REMOTE_ACCESS_SESSION_TTL_SECONDS:7200}
    authorization-timeout-seconds: ${MANAGER_REMOTE_ACCESS_AUTH_TIMEOUT_SECONDS:45}
    allow-unknown-host-keys: ${MANAGER_REMOTE_ACCESS_ALLOW_UNKNOWN_HOST_KEYS:true}

server:
  port: ${MANAGER_PORT:8780}

spring:
  application:
    name: castrelyx-manager
  datasource:
    url: ${MANAGER_DB_URL:jdbc:mariadb://localhost:3306/castrelyx_manager}
    username: ${MANAGER_DB_USER:castrelyx}
    password: ${MANAGER_DB_PASSWORD:castrelyx}
    driver-class-name: org.mariadb.jdbc.Driver
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
