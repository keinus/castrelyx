manager_url: https://manager.example.com
enrollment_token: replace-with-one-time-token
agent_id: local-agent-01
tenant_id: default
cert_dir: ./certs
ca_cert_path: ./certs/ca.pem
tls_server_name: manager.example.com
ingest_transport: https
tcp_ingest_addr: logparser.example.com:9443
tcp_ingest_server_name: logparser.example.com
batch_interval: 30s
spool_dir: ./spool
max_spool_record_bytes: 8mb
log_cursor_path: ./spool/log-cursors.json
log_message_max_bytes: 1024
update_enabled: true
update_channel: stable
update_check_interval: 6h
update_dir: ./update
update_public_key_path: ./certs/update_public_key.pem
remote_tasks_enabled: true
remote_task_interval: 10s
file_manager_enabled: true
file_manager_allow_delete: true
file_manager_max_transfer_bytes: 256mb
file_manager_poll_interval: 5s
file_manager_roots:
  - /
collectors:
  - identity
  - metric
  - network
  - process
  - service
  - port
  - package
  - firewall
  - log_tailer
  - agent_health
